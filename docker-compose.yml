version: '3.9'

services:
  server:
    build: ./server
    container_name: fileup-server
    ports:
      - "4000:3000"
    networks:
      - fullstack-net
    restart: unless-stopped
  client:
    build: ./client
    container_name: fileup-client
    ports:
      - "5174:5173"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped
    
networks:
  fullstack-net:
    driver: bridge
